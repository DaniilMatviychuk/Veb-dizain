<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Практическая работа "№1"</h1>
        <p> Выполнить табулирование функции y^2+5x</p>
        <script>
            var x; //описание переменных
            var y;
            for (x=-5; x<=10; x+=2){
                y=x*x+5*x;
                document.write('x='+x+'y = ' +y+'<br>');
            }
    </script>
</body>
</html>
