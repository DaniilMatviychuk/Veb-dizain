<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Практическая работа "№2"</h1> 
    <p> Вывести на экран столбцы чётных чисел в промежутке от 0 до 100</p>
    <script>
        var i=0; //итератор цикла
        while (i<=100){
            document.write(i+'<br>');
        i+=2;
        }
    </script>
</body>
</html>
