<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>События</title>
</head>
<body>
    <button id="My Elem"> Нажми</button>
    <script>
        function message(){
            alert("Ура!");
        }
        var button=document.getElementById("My Elem");
        button.addEventListener("click",message);
    </script>
</body>
</html>
