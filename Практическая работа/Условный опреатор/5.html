<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var color = prompt ('Введите цвет?','');
        switch(color){
            case "красный":
            alert("red");
            break;
            case "зелёный":
            alert("green");
            break; 
             case "синий":
            alert("blue");
            break;
            default:
            alert("у нас нет цвета на таком языке");
            break;
        }
    </script>
</body>
</html>
