<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        function Ok(){
            var Elem="Фамилия: " + document.f.Family.value + "\nИмя: " + document.f.Name.value + "\nГруппа: " + document.f.Group.value;
            var A = new Array (document.f.t1, document.f.t2, document.f.t3, document.f.t4, document.f.t5, document.f.t6, document.f.t7, document.f.t8, document.f.t9);
            var Res=0;
            for (i in A){
                if (A[i].checked) Res = Res + parseInt(A[i].value);
            }
            switch (Res){
                case 3:alert(Elem +"\nВаша отметка - отлично");
                break;
                case 2:alert(Elem +"\nВаша отметка - хорошо");
                break;
                case 1:alert(Elem +"\nВаша отметка - удовлетворительно");
                break;
                case 0:alert(Elem +"\nВаша отметка - неудовлетворительно");
                break;
            }
        }
    </script>
    <form name="f">
        <h2>Введите свои данные:</h2>
        <table>
            <tr>
                <td><b>Фамилия:</b></td>
                <td><input type='text' name="Family" size="20" onBlur="this.value=this.value.charAt(0).toUpperCase()+this.value.slice(1)"></td>
            </tr>
            <tr>
                <td><b>Имя:</b></td>
                <td><input type='text' name="Name" size="20" onBlur="this.value=this.value.charAt(0).toUpperCase()+this.value.slice(1)"></td>
            </tr>
            <tr>
                <td><b>Группа:</b></td>
                <td>
                    <select name="Group" size="1">
                        <option value="1а">1а</option>
                        <option value="1б">1б</option>
                        <option value="1в">1в</option>
                        <option value="1г">1г</option>
                        <option value="1ю">1ю</option>
                        <option value="1ж">1ж</option>
                        <option value="1ф">1ф</option>
                        <option value="2а">2а</option>
                        <option value="2б">2б</option>
                        <option value="2в">2в</option>
                        <option value="2г">2г</option>
                        <option value="2ж">2ж</option>
                        <option value="2ю">2ю</option>
                        <option value="2ф">2ф</option>
                        <option value="3а">3а</option>
                        <option value="3б">3б</option>
                        <option value="3г">3г</option>
                        <option value="3ю">3ю</option>
                        <option value="3б">3б</option>
                        <option value="3ж">3ж</option>
                        <option value="3ф">3ф</option>
                        <option value="4а">4а</option>
                        <option value="4б">4б</option>
                        <option value="4г">4г</option>
                        <option value="4ж">4ж</option>
                        <option value="4в">4в</option>
                        <option value="4ф">4ф</option>
                        <option value="5г">5г</option>
                        <option value="5ж">5ж</option>
                    </select>
                </td>
            </tr>
        </table>
        <p align="center">
            <font size="5"><b>Тест</b></p>
                <font size="4">Вопрос №1. <b> Какой тег определяет переход на следующую строку?
                </b><br>
                <font size="3">
                <input type="radio" name="a1" id="t1" value="1"> br  <br>
                <input type="radio" name="a1" id="t2" value="0"> a <br>
                <input type="radio" name="a1" id="t3" value="0"> div <br>
                <br><br>
                <font size="4">Вопрос №2. <b> Какие способы верстки Web-страниц есть?</b><br>
                <font size="3">
                <input type="radio" name="a2" id="t4" value="1"> блочные, табличные <br>
                <input type="radio" name="a2" id="t5" value="0"> иерархические <br>
                <input type="radio" name="a2" id="t6" value="0"> реляционные <br>
                <br><br>
                <font size="4">Вопрос №3. <b> Имя тега, которым задается строка таблицы </b><br>
                    <font size="3">
                    <input type="radio" name="a3" id="t7" value="0"> table; <br>
                    <input type="radio" name="a3" id="t8" value="1"> tr;<br>
                    <input type="radio" name="a3" id="t9" value="0"> cell;<br>
                    <br><br>
                <p align="center">
                    <input onclick='Ok();' type="button" value='Результат тестирования'>
                    <input type="reset" value="Сброс"></p>
                    </form>
</body>
</html>
