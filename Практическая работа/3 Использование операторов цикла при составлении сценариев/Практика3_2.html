<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Операторы циклов</title>
</head>
<body>
    <center>
        <h1>Практическая работа "Использование операторов цикла при составлении сценариев"</h1>
    </center>
    <p>Найти сумму чисел от 1 до 100</p>
    <script>
        var s=0;
        var i=1;
        while (i<=100) {
           s=s+i;
           i++;           
        }
        document.write('Сумма = '+ s)
    </script>
</body>
</html>
