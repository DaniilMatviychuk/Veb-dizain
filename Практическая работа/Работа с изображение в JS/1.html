<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Изменение свойств изображения</title>
   <script>
    function changeimg(){
        document.getElementById("mayimg").src = document.myform.mysrc.value;
        document.getElementById("mayimg").width = document.myform.mywidth.value;
        document.getElementById("mayimg").height = document.myform.myheight.value;
    }
   </script> 
   </head>
   <body>
    <form id="myform" name="myform">
        Файл:
        <select  id="mysrc" name="mysrc">
            <option value="football074.png">Картинка 1</option>
            <option value="unnamed.png">    Картинка 2</option>
            <option value="m1000x1000.png"> Картинка 3</option>
        </select>
        <br>
        Ширина:
        <input id = "mywidth" name ="mywidth" type ="text" value ="200" size ="4">
        Высота:
        <input id = "myheight" name ="myheight" type ="text" value ="100" size ="4">
        <br>
        <input id = "applay" name ="applay" type ="button" value ="Применить" onclick ="changeimg()">
        <input id = "cancel" name ="cancel" type ="button" value ="Отмена" onclick ="document.myform.reset(); changeimg()">
    </form>
        <img   id = "mayimg" name ="mayimg" src ="football074.png" alt ="Картинка" width ="200" height ="100">
   </body>
</html>
