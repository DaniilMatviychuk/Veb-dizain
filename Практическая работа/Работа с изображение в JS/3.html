<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Смена изображенй</title>
</head>
<body>
    <script>
        var a=0;
        function changeImage() {
            if (a==0) {
                document.img.src ='football074.png';
                a=1;
            }
            else {
                document.img.src='m1000x1000.png';
                a=0;
            }
        }
    </script>
    <button onClick="changeImage()">Сменить изображение</button>
    <br>
    <img name="img" src="football074.png"/>
</body>
</html>
