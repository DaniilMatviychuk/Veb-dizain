<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Работа со строками</title>
</head>
<body>
    Исходное слово: <b>программирование</b>
    <br>
    1 слово: <b id="sl1"></b>
    <br>
    2 слово: <b id="sl2"></b>
    <br>
    3 слово: <b id="sl3"></b>
    <br>
    4 слово: <b id="sl4"></b>

    <script>
        var a="программирование";
        var a1=a.slice(3,8);
        document.getElementById("sl1").innerHTML=a1;
        var a="программирование";
        var a2=a.slice(7,10);
        document.getElementById("sl2").innerHTML=a2;
        var a3=a.slice(9,12);
        document.getElementById("sl3").innerHTML=a3;
        var a4=a.slice(0,8);
        document.getElementById("sl4").innerHTML=a4;
        </script>
</body>
</html>
