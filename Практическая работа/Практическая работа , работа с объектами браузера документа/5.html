<body>
   <h1 align="center"> История</h1> 
   <button onclick="goBack()"> Вернуться назад </button>;
   <button onclick="goForward()"> Перейти вперёд </button>;
   <button onclick="goGo()"> Перейти на заднную страницу </button>;
   <button onclick="myWindovOpen()"> Открыть окно </button>;
<script>
document.write('<br>'+ "Количество страниц , просмотенный на текущее окне , равно " + history.length);
function goBack() {
history.back();
}
function goForward(){
    history.forward();
}
function goGo (n){
    var n=prompt ("На какую страницу перейти?",'');
    history.go (n);
}
var myWindov;
function myWindovOpen(){
    myWindov = window.open("http://yandex.ru" , "_self" , "top=250 , left=250 , width=250 , heigth=250");
}
    </script>
