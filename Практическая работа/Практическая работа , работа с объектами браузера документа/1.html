<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1 align="center"> Информация о браузера</h1><br>
    <script>
        var firsth=prompt("Введение ваше имя:","ваше имя");
        document.write("Привет,"+ firsth +". Вы используете "+ navigator.appName +". Версия " + navigator.appVersion +" <br />");
        document.write("язык браузера: " + navigator.language + "<br />" );
        document.write("Название ОС:" + navigator.oscpu + "<br />");
        document.write("Геолокация:" + navigator.geolocation +"<br />");
        document.write("Платформа:" + navigator.platform + "<br />");
        document.write("Движок:" + navigator.userAgent + "<br />");    
    </script>
</body>
</html>
