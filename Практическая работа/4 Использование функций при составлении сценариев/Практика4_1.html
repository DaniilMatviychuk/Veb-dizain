<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Функции</title>
</head>
<body>
    <h3>Найти большее из двух чисел</h3>
    <br>
    <button onclick="max()">Ввести числа</button>
    <br>
    Большее число <b id="maximal"></b>
    <script>
        function max(a,b) {
            var a = prompt ('Введите первое число','');
            var b = prompt ('Введите второе число',''); 
            if(a>b) {
                document.getElementById('maximal').innerHTML=a;}
            else {
                document.getElementById('maximal').innerHTML=b;}
        }
    </script>
</body>
</html>
