<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Функции</title>
</head>
<body>
    Куб числа <b id="ch1"></b>
    равен <b id="ch2"></b>
    <script>
        var z = prompt ('Введите число','');
        document.getElementById('ch1').innerHTML=z; //описываем функцию
        function cube(a) {
            return (a*a*a);
        }
        document.getElementById('ch2').innerHTML=cube(z);
    </script>
</body>
</html>
