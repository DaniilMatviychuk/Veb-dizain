<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
         //получаем текущей момент времени
         var dat=new Date();
         var a=dat.getDate();
         var b=dat.getMonth();
         var c=dat.getFullYear();
         document.write(a+'-'+b+'-'+c+'<br>');
    </script>
</body>
</html>
