<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Условные операторы</title>
</head>
<body>
    <script>
        var x=prompt ('Введите первое число', 'x');
        var y=prompt ('Введите второе число', 'y');
        var z=(x>y)?x:y;
        document.write ('Большее число ', z)
    </script>
</body>
</html>
